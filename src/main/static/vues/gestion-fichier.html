<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion du fichier</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../CSS/style.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 background">

<div id="navbarContainer"></div>

<div class="container mt-5">
  <h2 id="fileTitle" class="text-center mb-4 text-blanc">Gestion du fichier</h2>

  <h4 class="text-blanc">Visibilité</h4>
  <button id="toggleVisibilityBtn" class="btn btn-outline-info rounded-pill px-4 py-2 mb-3">Changer</button>

  <h4 class="text-blanc mt-4">Ajouter un contributeur</h4>
  <div class="mb-4 w-50">
    <input type="email" id="emailContributor" placeholder="Email contributeur" class="form-control">
    <button class="btn btn-outline-green rounded-pill px-4 py-2 mt-2" onclick="addContributor()">Ajouter</button>
  </div>

  <h4 class="text-blanc">Liste des contributeurs</h4>
  <ul id="contributorsList" class="list-group w-50 mb-4"></ul>

  <hr>

  <button class="btn btn-outline-danger rounded-pill px-4 py-2" onclick="deleteFile()">Supprimer le fichier </button>
</div>

<div id="footerContainer"></div>
<script src="../js/fichiers.js"></script>

<script>
  fetch("NavBar.html")
          .then(res => res.text())
          .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
          });

  fetch("Footer.html")
          .then(res => res.text())
          .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
          });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
