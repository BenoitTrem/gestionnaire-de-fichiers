<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 background">
<div id="navbarContainer"></div>

<div class="container flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 container_ mb-5 mt-5">
            <h3 class="text-center mb-4">Inscription</h3>
            <form id="FormInscription">
                <div id="ErreurInscription" class="text-danger mb-2"></div>
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur *</label>
                    <input type="text" class="form-control" id="username" placeholder="Entrez votre nom d'utilisateur" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse courriel *</label>
                    <input type="email" class="form-control" id="email" placeholder="Entrez votre courriel" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe *</label>
                    <input type="password" class="form-control" id="password" placeholder="Entrez votre mot de passe" required>
                </div>
                <div class="mb-3">
                    <label for="confirmerPassword" class="form-label">Confirmer le mot de passe *</label>
                    <input type="password" class="form-control" id="confirmerPassword" placeholder="Confirmez votre mot de passe" required>
                </div>
                <div class="mb-5">
                    <label for="profileImage" class="form-label">Image de profil</label>
                    <input type="file" class="form-control" id="profileImage">
                </div>
                <button type="submit" class="btn btn-outline-primary rounded-pill px-4 py-2 w-100 mb-2 bold-outline-btn">S'inscrire</button>
            </form>
            <hr>
            <p class="text-center mt-3">Vous avez déjà un compte? <a href="Connexion.html">Se connecter</a></p>
        </div>
    </div>
</div>
<div id="footerContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/inscription.js"></script>

<script>
    fetch("NavBar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
    fetch("Footer.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
</script>

</body>
</html>
