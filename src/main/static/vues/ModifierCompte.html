<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier mon compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/style.css" rel="stylesheet">
</head>
<div id="navbarContainer"></div>
<body class="d-flex flex-column min-vh-100 background">

<div class="container flex-grow-1 d-flex justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <h2 class="text-center mb-5">Modifier mon compte</h2>
        <div class="card p-4 container_">
            <div id="profil" class="text-center mb-4">
            </div>

            <form id="modifierCompteForm">
                <div class="mb-3">
                    <label for="username"  class="form-label">Nom d'utilisateur</label>
                    <input type="text" id="username" class="form-control" disabled>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse courriel</label>
                    <input type="email" id="email" class="form-control" required placeholder="Votre courriel">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Nouveau mot de passe</label>
                    <input type="password" id="password" class="form-control" placeholder="Laissez vide pour ne pas modifier">
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Laissez vide pour ne pas modifier">
                </div>

                <div class="mb-3">
                    <label for="photoProfile" class="form-label">Photo de profil</label>
                    <input type="file" id="photoProfile" class="form-control">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-outline-primary rounded-pill px-4 py-2 w-100 mb-2 bold-outline-btn mt-3">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div id="footerContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/refreshToken.js"></script>
<script src="../js/modifierCompte.js"></script>
<script>
    fetch("NavBar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
    fetch("Footer.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
</script>
</body>
</html>
