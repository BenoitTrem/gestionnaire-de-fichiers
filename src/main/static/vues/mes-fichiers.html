<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes fichiers</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../CSS/style.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 background">

<div id="navbarContainer"></div>

<div class="container mt-5">


  <div class="mt-5">
    <div class="card container_ px-4 py-4">
      <h4 >Ajouter un fichier</h4>
      <input type="file" id="uploadInput" class="form-control mb-2 mt-2">
      <div class="text-center">
        <button id="uploadBtn" class="btn btn-outline-green rounded-pill px-4 py-2 mt-3">
          Téléverser
        </button>
      </div>
    </div>
  </div>

  <div class="p-4"></div>
  <hr class="my-4">
  <h2 class="text-center mb-4 text-blanc mt-2">Mes fichiers</h2>

  <!-- Liste des fichiers -->
  <div id="mesFichiersContainer"></div>

</div>

<div id="footerContainer"></div>

<script src="../js/mes-fichiers.js"></script>

<script>
  fetch("NavBar.html")
          .then(res => res.text())
          .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
          });

  fetch("Footer.html")
          .then(res => res.text())
          .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
          });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
