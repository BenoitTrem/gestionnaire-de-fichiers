<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commentaires signalés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/style.css" rel="stylesheet">
</head>
<div id="navbarContainer"></div>
<body class="d-flex flex-column min-vh-100 background">
<div class="container mt-5">
    <h2 class="text-center mb-5">Commentaires Signalés</h2>

    <div class="table-responsive mt-4">
        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Auteur</th>
                <th class="commentaire">Commentaire</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="commentairesTableBody">
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="commentaireModal" tabindex="-1" aria-labelledby="commentModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="commentModalLabel">Commentaire Complet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="commentaireCompletTexte"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4 py-2 bold-outline-btn-commentaire" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

</div>
</div>

<div id="footerContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/refreshToken.js"></script>
<script src="../js/commentairesSignales.js"></script>
<script>
    fetch("NavBar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
    fetch("Footer.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
</script>
</body>
</html>
