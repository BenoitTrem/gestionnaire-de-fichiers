<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 background">
<div id="navbarContainer"></div>
<div class="container flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 container_">
            <h3 class="text-center mb-4">Mot de passe oublié</h3>
            <p class="text-center text-muted mb-4">
                Entrez votre Adresse courriel ci-dessous et nous vous enverrons un lien pour réinitialiser votre mot de passe.
                Vérifiez votre boîte de réception et éventuellement vos spams.
            </p>
            <form id="mot_de_passe_oublie_form">
                <div id="errorMsg" class="text-danger mb-2"></div>
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse courriel</label>
                    <input type="email" class="form-control" id="email" placeholder="Entrez votre courriel" required>
                </div>
                <button type="submit" class="btn btn-outline-primary rounded-pill px-4 py-2 w-100 mb-2 bold-outline-btn mt-3">Envoyer le lien</button>
            </form>
            <p class="text-center mt-3">
                <a href="Connexion.html" class="text-decoration-none">← Retour à la connexion</a>
            </p>
        </div>
    </div>
</div>
<div id="footerContainer"></div>
<script src="../js/reinitialserMotDePasse.js"></script>
<script>
    fetch("NavBar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
    fetch("Footer.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
</script>
</body>
</html>
