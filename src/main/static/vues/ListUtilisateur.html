<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des utilisateurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/style.css" rel="stylesheet">
</head>
<div id="navbarContainer"></div>
<body class="d-flex flex-column min-vh-100 background">
<div class="container mt-5" id="users-container">
    <h2 class="text-center mb-5">Gestion des utilisateurs</h2>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>#</th>
            <th>Photo de profil</th>
            <th>Nom d'utilisateur</th>
            <th>Courriel</th>
            <th>Rôle</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="listeUtilisateur"></tbody>
    </table>
</div>
<div id="footerContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/refreshToken.js"></script>
<script src="../js/gestionUtilisateur.js"></script>
<script>
    fetch("NavBar.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbarContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/NavBar.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
    fetch("Footer.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footerContainer").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../js/footer.js";
            document.body.appendChild(script);
        })
        .catch(err => console.error("Erreur:", err));
</script>
</body>
</html>
